backend:
  name: github
  repo: digizyn83/samiracoach
  branch: main
  auth_type: pkce

locale: fr

media_folder: "uploads"
public_folder: "/uploads"

slug:
  encoding: "unicode"
  clean_accents: false

collections:
  - name: "articles"
    label: "Articles"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date de publication", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Image de couverture", name: "image", widget: "image", required: false }
      - { label: "Extrait", name: "excerpt", widget: "text", required: false, hint: "Court resume qui apparait sur la page blog (2-3 lignes max)" }
      - { label: "Contenu", name: "body", widget: "markdown" }
